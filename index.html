<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mental Math Gym</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#151A28">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Math Gym">

<style>
:root{
  --paper:#FAF9F3; --surface:#FFFFFF; --ink:#1E2436; --muted:#6B7080;
  --accent:#D98E04; --accent-strong:#B37503; --accent-soft:#FBF0D9;
  --good:#2E9E6B; --good-soft:#E3F3EC; --bad:#D0453E; --bad-soft:#FAE7E6;
  --line:#E3E1D6; --grid:rgba(90,110,160,.07);
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,"Liberation Mono",monospace;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#151A28; --surface:#1D2334; --ink:#EDEDE4; --muted:#9BA0AE;
    --accent:#F0B429; --accent-strong:#F7C64F; --accent-soft:#2B2A1E;
    --good:#4CBE8D; --good-soft:#1C3229; --bad:#E4736D; --bad-soft:#3A2422;
    --line:#2C3347; --grid:rgba(160,180,230,.055);
  }
}
:root[data-theme="light"]{
  --paper:#FAF9F3; --surface:#FFFFFF; --ink:#1E2436; --muted:#6B7080;
  --accent:#D98E04; --accent-strong:#B37503; --accent-soft:#FBF0D9;
  --good:#2E9E6B; --good-soft:#E3F3EC; --bad:#D0453E; --bad-soft:#FAE7E6;
  --line:#E3E1D6; --grid:rgba(90,110,160,.07);
}
:root[data-theme="dark"]{
  --paper:#151A28; --surface:#1D2334; --ink:#EDEDE4; --muted:#9BA0AE;
  --accent:#F0B429; --accent-strong:#F7C64F; --accent-soft:#2B2A1E;
  --good:#4CBE8D; --good-soft:#1C3229; --bad:#E4736D; --bad-soft:#3A2422;
  --line:#2C3347; --grid:rgba(160,180,230,.055);
}
html,body{margin:0;padding:0}
body{background:var(--paper)}
#app{
  min-height:100vh; color:var(--ink); font-family:var(--sans);
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:28px 28px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:640px;margin:0 auto;padding:0 18px 64px}
.top{
  position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;
  padding:14px 4px 12px;background:color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter:blur(6px);border-bottom:1px solid var(--line);margin-bottom:18px;
}
.top .back{
  border:1px solid var(--line);background:var(--surface);color:var(--ink);
  border-radius:8px;padding:7px 12px;font:600 14px var(--sans);cursor:pointer;
}
.top .back:active{transform:translateY(1px)}
.top h2{font:700 17px/1.2 var(--serif);margin:0;flex:1;text-wrap:balance}
.top .streak{font:600 13px var(--mono);color:var(--accent-strong);white-space:nowrap}
h1{font:700 34px/1.1 var(--serif);margin:26px 0 6px;letter-spacing:-.01em;text-wrap:balance}
.sub{color:var(--muted);font-size:15px;line-height:1.55;margin:0 0 22px;max-width:46ch}
.kicker{
  font:700 11px var(--sans);letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent-strong);margin:26px 0 10px;
}
.lesson-row{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:13px 15px;margin-bottom:9px;cursor:pointer;color:var(--ink);font-family:var(--sans);
}
.lesson-row:active{transform:translateY(1px)}
.lesson-row .num{
  font:700 24px var(--serif);color:var(--accent);min-width:32px;text-align:center;
  font-variant-numeric:tabular-nums;
}
.lesson-row .body{flex:1;min-width:0}
.lesson-row .t{font:650 15.5px/1.25 var(--sans);margin:0 0 2px}
.lesson-row .d{font-size:12.5px;color:var(--muted);margin:0;line-height:1.4}
.lesson-row .prog{font:600 12px var(--mono);color:var(--muted);white-space:nowrap}
.lesson-row.workout{border-color:var(--accent);background:var(--accent-soft)}
.tech{
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:16px 18px;margin-bottom:12px;
}
.tech h3{font:700 17px/1.3 var(--serif);margin:0 0 8px;text-wrap:balance}
.tech p{margin:0 0 8px;font-size:14.5px;line-height:1.6;color:var(--ink)}
.tech p:last-child{margin-bottom:0}
.tech .ex{
  font:500 13.5px/1.7 var(--mono);background:var(--accent-soft);
  border-radius:8px;padding:10px 13px;margin:10px 0 2px;overflow-x:auto;
  font-variant-numeric:tabular-nums;
}
.drill-row{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:12px 15px;margin-bottom:8px;cursor:pointer;color:var(--ink);
}
.drill-row:active{transform:translateY(1px)}
.drill-row .go{color:var(--accent-strong);font:700 18px var(--serif)}
.drill-row .body{flex:1}
.drill-row .t{font:650 14.5px var(--sans);margin:0 0 1px}
.drill-row .d{font-size:12.5px;color:var(--muted);margin:0}
.drill-row .prog{font:600 12px var(--mono);color:var(--muted)}
.prog.due{color:var(--accent-strong);font-weight:700}
.drill-row .lv{font:600 10.5px var(--mono);color:var(--accent-strong);background:var(--accent-soft);border-radius:5px;padding:1px 5px;vertical-align:1px}
.statbar{
  display:flex;gap:8px;margin-bottom:16px;font-variant-numeric:tabular-nums;
}
.chip{
  flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;
  padding:8px 6px;text-align:center;
}
.chip .v{font:700 18px var(--mono);display:block}
.chip .l{font:600 10.5px var(--sans);letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.problem{
  font:600 clamp(26px,8vw,40px)/1.3 var(--mono);text-align:center;
  padding:34px 10px 8px;font-variant-numeric:tabular-nums;letter-spacing:.01em;
  overflow-x:auto;
}
.pq{color:var(--muted);font:500 14px var(--sans);text-align:center;margin:0 0 18px;line-height:1.5}
.answer-zone{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:14px}
input.ans{
  font:600 24px var(--mono);width:170px;max-width:60vw;text-align:center;
  padding:12px 10px;border-radius:12px;border:2px solid var(--line);
  background:var(--surface);color:var(--ink);font-variant-numeric:tabular-nums;
}
input.ans.small{width:110px}
input.ans:focus{outline:none;border-color:var(--accent)}
.rlabel{font:600 16px var(--mono);color:var(--muted)}
.btn{
  border:none;border-radius:12px;padding:13px 24px;cursor:pointer;
  font:700 16px var(--sans);background:var(--accent);color:#20180A;transition:transform .05s;
}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);font-weight:600}
.btnrow{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.choices.wide{grid-template-columns:1fr}
.choices button{
  border:1.5px solid var(--line);background:var(--surface);color:var(--ink);
  border-radius:11px;padding:13px 10px;font:600 16px var(--mono);cursor:pointer;
  font-variant-numeric:tabular-nums;
}
.choices button:active{transform:translateY(1px)}
.choices button.hit{border-color:var(--good);background:var(--good-soft)}
.choices button.miss{border-color:var(--bad);background:var(--bad-soft)}
.fb{
  border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:15px;line-height:1.55;
}
.fb.good{background:var(--good-soft);border:1px solid var(--good)}
.fb.bad{background:var(--bad-soft);border:1px solid var(--bad)}
.fb .verdict{font:700 15px var(--sans);display:block;margin-bottom:4px}
.fb.good .verdict{color:var(--good)}
.fb.bad .verdict{color:var(--bad)}
.fb .how{font-size:14px;color:var(--ink);opacity:.92}
.fb .how b{font-family:var(--mono);font-weight:600}
table.fmap{border-collapse:collapse;margin:8px auto;font:600 13px var(--mono);font-variant-numeric:tabular-nums}
.fmap th,.fmap td{min-width:36px;height:34px;text-align:center;border:1px solid var(--line);padding:2px}
.fmap th{color:var(--muted);font-weight:600;background:var(--surface)}
.fmap td.f-good{background:var(--good-soft);color:var(--good)}
.fmap td.f-mid{background:var(--accent-soft);color:var(--accent-strong)}
.fmap td.f-slow{background:var(--bad-soft);color:var(--bad)}
.fmap td.f-unk{color:var(--muted);background:var(--surface)}
.note{
  background:var(--surface);border:1px dashed var(--line);border-radius:12px;
  padding:12px 15px;font-size:13px;color:var(--muted);line-height:1.55;margin-top:22px;
}
@media (prefers-reduced-motion: reduce){ *{transition:none!important} }
button:focus-visible, input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<div id="app"><div class="wrap">
  <div class="top" id="topbar" hidden>
    <button class="back" id="backBtn" type="button">&#8592; Back</button>
    <h2 id="topTitle"></h2>
    <span class="streak" id="topStreak"></span>
  </div>
  <main id="view"></main>
</div></div>
<script>
"use strict";
/* ---------- helpers ---------- */
const R = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
const pick = (arr) => arr[R(0, arr.length - 1)];
const F = (n) => n.toLocaleString("en-US");
const shuffle = (arr) => { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = R(0, i); [a[i], a[j]] = [a[j], a[i]]; } return a; };
const digitSum = (n) => { n = Math.abs(n); return n === 0 ? 0 : ((n - 1) % 9) + 1; };
const sumDigitsOnce = (n) => String(Math.abs(n)).split("").reduce((s, c) => s + (+c), 0);

/* ---------- drill generators ----------
   Each gen() returns:
   { q, sub?, kind:'num'|'dec'|'rem'|'mc', a, a2?, tol?, rtol?, choices?, how }
--------------------------------------- */
const DRILLS = {};
const D = (id, name, desc, gen) => { DRILLS[id] = { id, name, desc, gen }; };

/* ---- Lecture 1 ---- */
D("warmup", "Left-to-right warm-ups", "Easy sums and ×10s you can say instantly", () => {
  const form = R(1, 3);
  if (form === 1) {
    const a = R(2, 9) * pick([100, 1000]), b = R(11, 99);
    return { q: `${F(a)} + ${b}`, kind: "num", a: a + b,
      how: `Say it left to right: <b>${F(a)}</b>, then append <b>${b}</b> → <b>${F(a + b)}</b>.` };
  }
  if (form === 2) {
    const a = R(11, 99), b = R(1, 9) * pick([10, 100, 1000]);
    return { q: `${a} + ${F(b)}`, kind: "num", a: a + b,
      how: `The big part first: <b>${F(b)}</b> plus <b>${a}</b> → <b>${F(a + b)}</b>.` };
  }
  const a = R(11, 999), m = pick([10, 100, 1000]);
  return { q: `${a} × ${F(m)}`, kind: "num", a: a * m,
    how: `Attach ${String(m).length - 1} zero${m > 10 ? "s" : ""}: <b>${F(a * m)}</b>.` };
});
D("mult11", "Multiply by 11", "The classic: spread the digits, insert the sum", (lvl = 1) => {
  const hard = Math.random() < [0.25, 0.5, 0.8][lvl - 1];
  if (!hard) {
    const n = R(12, 98), t = Math.floor(n / 10), u = n % 10, s = t + u;
    return { q: `${n} × 11`, kind: "num", a: n * 11,
      how: s > 9
        ? `${t} + ${u} = <b>${s}</b> — more than 9, so carry: the middle keeps ${s % 10} and the ${t} becomes ${t + 1} → <b>${F(n * 11)}</b>.`
        : `Split ${t}_${u} and insert the digit sum ${t}+${u}=<b>${s}</b> in the middle: <b>${n * 11}</b>.` };
  }
  const n = R(112, 987), d = String(n).split("").map(Number);
  return { q: `${n} × 11`, kind: "num", a: n * 11,
    how: `Keep the ends, insert neighbor sums: ${d[0]}+${d[1]}=<b>${d[0] + d[1]}</b> and ${d[1]}+${d[2]}=<b>${d[1] + d[2]}</b> (carry if needed) → <b>${F(n * 11)}</b>.` };
});
D("sq5", "Squares ending in 5", "First digit × next digit, attach 25", (lvl = 1) => {
  const n = Math.random() < 0.7 ? R(1, 9) * 10 + 5 : R(10, lvl >= 3 ? 100 : lvl === 2 ? 60 : 19) * 10 + 5;
  const h = Math.floor(n / 10);
  return { q: `${F(n)}²`, kind: "num", a: n * n,
    how: `${h} × ${h + 1} = <b>${F(h * (h + 1))}</b>, attach 25 → <b>${F(n * n)}</b>. Works at any size: the part before the 5 times its next neighbor.` };
});
D("sum10", "Same tens, units sum to 10", "Like 84 × 86 — cousins of the 5² trick", () => {
  const t = R(2, 9), u = R(1, 9), a = t * 10 + u, b = t * 10 + (10 - u);
  const tail = u * (10 - u);
  return { q: `${a} × ${b}`, kind: "num", a: a * b,
    how: `${t} × ${t + 1} = <b>${t * (t + 1)}</b>, attach ${u} × ${10 - u} = <b>${tail < 10 ? "0" + tail : tail}</b> (two digits) → <b>${F(a * b)}</b>.` };
});
D("teens", "Multiplying teens", "Numbers between 10 and 20, fast", () => {
  if (Math.random() < 0.5) {
    const a = R(11, 19), b = R(3, 9);
    return { q: `${a} × ${b}`, kind: "num", a: a * b,
      how: `${b} × 10 = <b>${b * 10}</b>, plus ${b} × ${a - 10} = <b>${b * (a - 10)}</b> → <b>${a * b}</b>.` };
  }
  const a = R(11, 19), b = R(11, 19);
  return { q: `${a} × ${b}`, kind: "num", a: a * b,
    how: `${a} + ${b % 10} = <b>${a + b % 10}</b>, ×10 → <b>${(a + b % 10) * 10}</b>, plus ${a % 10} × ${b % 10} = <b>${(a % 10) * (b % 10)}</b> → <b>${a * b}</b>.` };
});

/* ---- Times Table Sprint (fact fluency) ---- */
let factStats = {};
try { factStats = JSON.parse(localStorage.getItem("mmg-facts-v1") || "{}"); } catch (e) { factStats = {}; }
const saveFacts = () => { try { localStorage.setItem("mmg-facts-v1", JSON.stringify(factStats)); } catch (e) {} };
const factKey = (a, b) => Math.min(a, b) + "x" + Math.max(a, b);
const ALL_FACTS = [];
for (let i = 2; i <= 9; i++) for (let j = i; j <= 9; j++) ALL_FACTS.push([i, j]);
/* score = estimated answer time in ms, padded by error rate; unseen facts sit in the middle */
const factScore = (k) => {
  const f = factStats[k];
  if (!f || f.n < 2) return 4000;
  return f.t + 2500 * (f.e / f.n);
};
function updateFact(k, correct, ms) {
  const f = factStats[k] || (factStats[k] = { t: 3000, n: 0, e: 0 });
  f.n++; if (!correct) f.e++;
  const clipped = Math.min(ms, 8000);
  f.t = Math.round(f.t * 0.7 + clipped * 0.3 + (correct ? 0 : 1500));
  saveFacts();
}
D("ttsprint", "Times Table Sprint", "Timed single-digit facts — your slowest get served most", () => {
  let pair;
  if (Math.random() < 0.7) {
    const ranked = ALL_FACTS
      .map(p => [factScore(factKey(p[0], p[1])), p])
      .sort((x, y) => y[0] - x[0]);
    pair = ranked[R(0, 9)][1]; // one of the 10 slowest facts
  } else {
    pair = pick(ALL_FACTS); // occasional uniform pick keeps estimates fresh
  }
  const [a, b] = Math.random() < 0.5 ? pair : [pair[1], pair[0]];
  const m = Math.min(a, b) === 9 ? Math.max(a, b) : (a === 9 ? b : (b === 9 ? a : 0));
  let tip;
  if (a === 9 || b === 9) tip = `Nines rule: 9 × ${m} starts with ${m - 1} and the digits sum to 9 → <b>${9 * m}</b>.`;
  else if (a === 8 || b === 8) { const o = a === 8 ? b : a; tip = `Eights: double ${o} three times — ${o} → ${2 * o} → ${4 * o} → <b>${8 * o}</b>.`; }
  else if (a === 3 || b === 3) tip = `Threes: it's the ${a === 3 ? b : a}th step counting 3, 6, 9, 12… → <b>${a * b}</b>.`;
  else if (a === 6 || b === 6) { const o = a === 6 ? b : a; tip = `Sixes: 5 × ${o} = ${5 * o}, plus ${o} → <b>${6 * o}</b>.`; }
  else tip = `${a} × ${b} = <b>${a * b}</b> — aim for instant recall, under 1.5 s.`;
  return { q: `${a} × ${b}`, kind: "num", a: a * b, factKey: factKey(a, b), timed: true, how: tip };
});

/* ---- Lecture 2 ---- */
D("add2", "2-digit addition", "Tens first, then units", () => {
  const a = R(23, 88), b = R(12, 88);
  return { q: `${a} + ${b}`, kind: "num", a: a + b,
    how: `${a} + ${Math.floor(b / 10) * 10} = <b>${a + Math.floor(b / 10) * 10}</b>, then + ${b % 10} → <b>${a + b}</b>.` };
});
D("add3", "3-digit addition", "Hundreds, tens, units — left to right", () => {
  const a = R(120, 880), b = R(110, 880);
  const b1 = Math.floor(b / 100) * 100, b2 = Math.floor((b % 100) / 10) * 10, b3 = b % 10;
  const near = 100 - (b % 100);
  const useComp = (b % 100) > 84;
  return { q: `${a} + ${b}`, kind: "num", a: a + b,
    how: useComp
      ? `${b} is ${F(b1 + 100)} − ${near}: add ${a} + ${F(b1 + 100)} = <b>${F(a + b1 + 100)}</b>, subtract ${near} → <b>${F(a + b)}</b>.`
      : `${a} + ${b1} = <b>${a + b1}</b>, + ${b2} = <b>${a + b1 + b2}</b>, + ${b3} → <b>${F(a + b)}</b>.` };
});
D("sub2", "2-digit subtraction", "Turn borrowing into easy addition", () => {
  const a = R(41, 99), b = R(12, a - 11);
  const borrow = (a % 10) < (b % 10);
  const up = Math.ceil(b / 10) * 10;
  return { q: `${a} − ${b}`, kind: "num", a: a - b,
    how: borrow
      ? `Subtract too much: ${a} − ${up} = <b>${a - up}</b>, add back ${up - b} → <b>${a - b}</b>.`
      : `${a} − ${Math.floor(b / 10) * 10} = <b>${a - Math.floor(b / 10) * 10}</b>, then − ${b % 10} → <b>${a - b}</b>.` };
});
D("sub3", "3-digit subtraction", "Use complements when it borrows", () => {
  const a = R(320, 980), b = R(120, a - 60);
  const bl = b % 100, comp = 100 - bl;
  const useComp = bl > 50;
  const upH = (Math.floor(b / 100) + 1) * 100;
  return { q: `${a} − ${b}`, kind: "num", a: a - b,
    how: useComp
      ? `${b} is ${F(upH)} − ${comp}: ${a} − ${F(upH)} = <b>${a - upH}</b>, add back ${comp} → <b>${a - b}</b>.`
      : `${a} − ${Math.floor(b / 100) * 100} = <b>${a - Math.floor(b / 100) * 100}</b>, then subtract ${bl} left to right → <b>${a - b}</b>.` };
});
D("comp100", "Complements of 100", "How far from 100?", () => {
  const n = R(11, 89);
  const t = Math.floor(n / 10), u = n % 10;
  return { q: `100 − ${n}`, sub: "Find the complement", kind: "num", a: 100 - n,
    how: u === 0
      ? `Ends in 0, so the complement does too: ${10 - t} and 0 → <b>${100 - n}</b>.`
      : `First digits sum to 9 (${t}+${9 - t}), last to 10 (${u}+${10 - u}) → <b>${100 - n}</b>.` };
});
D("comp1000", "Complements of 1000", "Digits to 9, 9, then 10", () => {
  const n = R(101, 899);
  const d = String(n).split("").map(Number);
  return { q: `1000 − ${n}`, sub: "Find the complement", kind: "num", a: 1000 - n,
    how: n % 10 === 0
      ? `Ends in 0: complement of ${n / 10} (from 100) with a 0 attached → <b>${1000 - n}</b>.`
      : `Make the digits sum to 9, 9, 10: ${9 - d[0]}, ${9 - d[1]}, ${10 - d[2]} → <b>${1000 - n}</b>.` };
});
D("change", "Making change", "Dollars to one less, cents to 100", () => {
  const base = pick([10, 20, 100]);
  const dol = R(1, base - 2), c = R(1, 99);
  const price = dol + c / 100, ans = base - price;
  const adol = base - 1 - dol, ac = 100 - c;
  return { q: `$${dol}.${String(c).padStart(2, "0")} from $${base}`, sub: "How much change? (e.g. 3.25)", kind: "dec", a: +ans.toFixed(2), tol: 0.001,

D("divis", "Divisibility tests", "Spot factors without dividing", () => {
  const k = pick([3, 4, 5, 6, 7, 8, 9, 11, 12]);
  const yes = Math.random() < 0.5;
  let n = R(120, 9800);
  if (yes) { n = n - (n % k); } else if (n % k === 0) { n = n + R(1, k - 1); }
  const head = Math.floor(n / 10), tail = n % 10, step7 = head - 2 * tail;
  const rules = {
    3: `digit sum ${sumDigitsOnce(n)} ${sumDigitsOnce(n) % 3 === 0 ? "is" : "is not"} a multiple of 3`,
    9: `digit sum ${sumDigitsOnce(n)} ${sumDigitsOnce(n) % 9 === 0 ? "is" : "is not"} a multiple of 9`,
    4: `last two digits ${String(n).slice(-2)} ${n % 4 === 0 ? "are" : "are not"} a multiple of 4`,
    5: `last digit is ${tail} — ${n % 5 === 0 ? "" : "not "}a 0 or 5`,
    7: `double the last digit and subtract: ${head} − ${2 * tail} = ${step7}, which ${step7 % 7 === 0 ? "is" : "is not"} a multiple of 7 (repeat if it's still big)`,
    8: `last three digits ${String(n).slice(-3)} ${n % 8 === 0 ? "are" : "are not"} a multiple of 8`,
    6: `it ${n % 2 === 0 ? "is" : "is not"} even and digit sum ${sumDigitsOnce(n)} ${sumDigitsOnce(n) % 3 === 0 ? "is" : "is not"} a multiple of 3`,
    11: `alternating digit sum is ${String(n).split("").reduce((s, c, i) => s + (i % 2 ? -1 : 1) * (+c), 0)}, ${n % 11 === 0 ? "" : "not "}a multiple of 11`,
    12: `needs 3 and 4: digit sum ${sumDigitsOnce(n)} ${sumDigitsOnce(n) % 3 === 0 ? "passes" : "fails"} the 3-test; last two digits ${String(n).slice(-2)} ${n % 4 === 0 ? "pass" : "fail"} the 4-test`
  };
  return { q: `Is ${F(n)} divisible by ${k}?`, kind: "mc", choices: ["Yes", "No"], a: n % k === 0 ? "Yes" : "No",
    how: `Test for ${k}: ${rules[k]} → <b>${n % k === 0 ? "divisible" : "not divisible"}</b>.` };
});

D("cubeest", "2-digit cubes, estimated", "Down d, down d, up 2d", () => {
  const n = R(41, 99);
  const d = n % 10 <= 5 ? n % 10 : n % 10 - 10;
  const z = n - d;
  const est = z * z * (z + 3 * d);
  return { q: `${n}³ ≈ ?`, sub: "Within 2.5% counts as correct", kind: "dec", a: n ** 3, rtol: 0.025,
    how: `Slide to ${z}, ${z}, ${z + 3 * d}: ${z} × ${z} × ${z + 3 * d} = <b>${F(est)}</b>. Exact: ${F(n ** 3)}.` };
});
D("mul3x2", "3-by-2 multiplication", "Factor, or split and distribute", (lvl = 1) => {
  const a = R(112, 989), b = R(12, lvl === 1 ? 39 : 89);
  const bt = Math.floor(b / 10) * 10;
  return { q: `${a} × ${b}`, kind: "num", a: a * b,
    how: `(${a} × ${bt}) + (${a} × ${b % 10}) = ${F(a * bt)} + ${F(a * (b % 10))} → <b>${F(a * b)}</b>. If ${b} factors into small numbers, that's usually easier.` };
});
D("pow4", "4th powers", "Square, then square again", (lvl = 1) => {
  const n = R(11, lvl >= 3 ? 40 : lvl === 2 ? 30 : 20);
  const s = n * n;
  return { q: `${n}⁴`, kind: "num", a: s * s,
    how: `${n}² = <b>${F(s)}</b>; then square that with the slide trick: ${F(s)}² → <b>${F(s * s)}</b>. Park the first square as a Major-system word if you need to.` };
});

/* ---- Lecture 12 ---- */
D("cuberoot", "Cube roots by ear", "Perfect cubes give themselves away", () => {
  const n = R(11, 99), c = n ** 3;
  const lastMap = { 1: 1, 2: 8, 3: 7, 4: 4, 5: 5, 6: 6, 7: 3, 8: 2, 9: 9, 0: 0 };
  const thousands = Math.floor(c / 1000);
  const tens = Math.floor(n / 10);
  return { q: `∛${F(c)}`, sub: "It's a perfect cube of a 2-digit number", kind: "num", a: n,
    how: `${F(thousands)} thousand sits between ${tens}³=${F(tens ** 3)} and ${tens + 1}³=${F((tens + 1) ** 3)} → tens digit <b>${tens}</b>. The cube ends in ${c % 10}, and only ${lastMap[c % 10]}³ ends that way → <b>${n}</b>.` };
});

const stat = (id) => stats[id] || (stats[id] = { ok: 0, tries: 0, best: 0 });

/* difficulty progression: accuracy + volume unlock wider problem ranges */
const drillLevel = (id) => {
  const s = stats[id];
  if (!s || !s.tries) return 1;
  const acc = s.ok / s.tries;
  if (s.ok >= 25 && acc >= 0.8) return 3;
  if (s.ok >= 10 && acc >= 0.7) return 2;
  return 1;
};
/* spaced review: a practiced drill comes due after an interval that grows with accuracy */
const drillDue = (id) => {
  const s = stats[id];
  if (!s || !s.tries || !s.last) return false;
  const acc = s.ok / s.tries;
  const intervalDays = acc >= 0.85 ? 6 : acc >= 0.6 ? 3 : 1.5;
  return (Date.now() - s.last) / 86400000 >= intervalDays;
};

/* ---------- drill ---------- */
function startDrill(drillId, opts) {
  session = { drillId, workout: !!opts.workout, backTo: opts.backTo, lesson: opts.lesson, streak: 0, solved: 0, tries: 0 };
  nav = { screen: "drill" };
  nextProblem();
}

function workoutPick() {
  /* spacing + weakness weighting: long-unseen and low-accuracy drills get picked more */
  const now = Date.now();
  const weights = WORKOUT_POOL.map(id => {
    const s = stat(id);
    if (!s.tries) return 1;
    const days = s.last ? Math.min(14, (now - s.last) / 86400000) : 14;
    const err = 1 - s.ok / s.tries;
    return 0.5 + days * (0.5 + 2 * err);
  });
  let total = weights.reduce((a, b) => a + b, 0), roll = Math.random() * total;
  for (let i = 0; i < weights.length; i++) { roll -= weights[i]; if (roll <= 0) return WORKOUT_POOL[i]; }
  return WORKOUT_POOL[WORKOUT_POOL.length - 1];
}

function currentDrill() {
  return session.workout ? DRILLS[workoutPick()] : DRILLS[session.drillId];
}

function nextProblem() {
  const d = currentDrill();
  session.currentId = d.id;
  session.lvl = drillLevel(d.id);
  session.item = d.gen(session.lvl);
  session.graded = false;
  session.t0 = Date.now();
  renderProblem(d);
}

  } else {
    inputHtml = `<div class="answer-zone">
        <input class="ans" id="ansQ" inputmode="${it.kind === "dec" ? "decimal" : "numeric"}" autocomplete="off" placeholder="?">
      </div><div class="btnrow"><button class="btn" id="checkBtn">Check</button><button class="btn ghost" id="skipBtn">Show me</button>${it.timed ? '<button class="btn ghost" id="mapBtn">Speed map</button>' : ""}</div>`;
  }
  view.innerHTML = `
    <div class="statbar">
      <div class="chip"><span class="v">${session.streak}</span><span class="l">Streak</span></div>
      <div class="chip"><span class="v">${session.solved}</span><span class="l">This run</span></div>
      <div class="chip"><span class="v">${acc === null ? "–" : acc + "%"}</span><span class="l">Accuracy</span></div>
      <div class="chip"><span class="v">${F(s.ok)}</span><span class="l">All time</span></div>
    </div>
    <div class="problem">${it.q}</div>
    <p class="pq">${it.sub || " "}</p>
    ${inputHtml}
    <div id="fbzone"></div>`;
  if (it.kind === "mc") {
    view.querySelectorAll("[data-choice]").forEach(b => b.addEventListener("click", () => gradeMC(b)));
  } else {
    $("#checkBtn").addEventListener("click", grade);
    $("#skipBtn").addEventListener("click", reveal);
    if (it.timed) $("#mapBtn").addEventListener("click", showFactMap);
    const q = $("#ansQ"); q.focus();
    view.querySelectorAll("input.ans").forEach(inp => inp.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); if (it.kind === "rem" && inp.id === "ansQ" && $("#ansR").value === "") $("#ansR").focus(); else grade(); }
    }));
  }
  window.scrollTo(0, 0);
}

function parseNum(v) {
  v = String(v).trim().replace(/[$\s]/g, "");
  if (/,\d{1,2}$/.test(v) && !v.includes(".")) v = v.replace(",", ".");
  v = v.replace(/,/g, "");
  if (v === "" || isNaN(+v)) return null;
  return +v;
}

function grade() {
  if (session.graded) return;
  const it = session.item;
  let correct = false, given = "";
  if (it.kind === "rem") {
    const q = parseNum($("#ansQ").value), r = parseNum($("#ansR").value);
    if (q === null || r === null) { $("#ansQ").focus(); return; }
    given = `${q} r ${r}`;
    correct = q === it.a && r === it.a2;
  } else {
    const v = parseNum($("#ansQ").value);
    if (v === null) { $("#ansQ").focus(); return; }
    given = String(v);
    const tol = it.tol !== undefined ? it.tol : (it.rtol !== undefined ? it.rtol * Math.abs(it.a) : 0.0001);
    correct = Math.abs(v - it.a) <= tol;
  }
  finishGrade(correct, given);
}

function gradeMC(btn) {
  if (session.graded) return;
  const it = session.item;
  const correct = btn.dataset.choice === String(it.a);
  btn.classList.add(correct ? "hit" : "miss");
  view.querySelectorAll("[data-choice]").forEach(b => {
    if (b.dataset.choice === String(it.a)) b.classList.add("hit");
    b.disabled = true;
  });
  finishGrade(correct, btn.dataset.choice);
}

function answerText(it) {
  if (it.kind === "rem") return `${F(it.a)} r ${it.a2}`;
  if (it.kind === "mc") return String(it.a);
  if (it.kind === "dec" && !Number.isInteger(it.a)) return (+it.a.toFixed(3)).toString();
  return F(it.a);
}

function finishGrade(correct, given) {
  session.graded = true;
  session.tries++;
  const s = stat(session.currentId);
  s.tries++; s.last = Date.now();
  if (correct) { session.solved++; session.streak++; s.ok++; if (session.streak > s.best) s.best = session.streak; }
  else session.streak = 0;
  saveStats();
  const elapsed = Date.now() - session.t0;
  let verdict;
  if (session.item.factKey) {
    updateFact(session.item.factKey, correct, elapsed);
    const secs = (elapsed / 1000).toFixed(1);
    verdict = correct
      ? (elapsed <= 1500 ? `Correct in ${secs} s ⚡ — that's automatic!` : `Correct in ${secs} s — aim under 1.5 s`)
      : `Not quite — it's ${answerText(session.item)}.`;
  } else {
    verdict = correct ? pick(["Correct!", "Nailed it!", "Yes!", "Lightning!"]) : "Not quite — it's " + answerText(session.item) + ".";
  }
  showFeedback(correct, verdict);
}

function reveal() {
  if (session.graded) return;
  session.graded = true;
  session.tries++;
  const s = stat(session.currentId); s.tries++; s.last = Date.now();
  session.streak = 0;
  saveStats();
  if (session.item.factKey) updateFact(session.item.factKey, false, 6000);
  showFeedback(null, `Answer: ${answerText(session.item)}`);
}

/* ---------- times-table speed map ---------- */
function showFactMap() {
  nav = { screen: "map" };
  topTitle.textContent = "Times table speed map";
  topStreak.textContent = "";
  let t = `<div style="overflow-x:auto"><table class="fmap"><tr><th>×</th>`;
  for (let j = 2; j <= 9; j++) t += `<th>${j}</th>`;
  t += `</tr>`;
  for (let i = 2; i <= 9; i++) {
    t += `<tr><th>${i}</th>`;
    for (let j = 2; j <= 9; j++) {
      const k = factKey(i, j), f = factStats[k], sc = factScore(k);
      const cls = (!f || f.n < 2) ? "f-unk" : sc < 1600 ? "f-good" : sc < 3000 ? "f-mid" : "f-slow";
      t += `<td class="${cls}">${f && f.n >= 2 ? (f.t / 1000).toFixed(1) : "·"}</td>`;
    }
    t += `</tr>`;
  }
  t += `</table></div>`;
  view.innerHTML = `<p class="kicker">Average answer time, seconds</p>${t}
    <p class="sub">Green = automatic (under ~1.5 s). Amber = correct but slow. Red = these steal your working memory mid-calculation — the sprint serves them most often. Dots are unmeasured.</p>
    <div class="btnrow"><button class="btn" id="mapBack">Back to sprint</button></div>`;
  $("#mapBack").addEventListener("click", () => { nav = { screen: "drill" }; nextProblem(); });
  window.scrollTo(0, 0);
}

function showFeedback(correct, verdict) {
  topStreak.textContent = session.streak > 1 ? `🔥 ${session.streak}` : "";
  $("#fbzone").innerHTML = `
    <div class="fb ${correct ? "good" : "bad"}">
      <span class="verdict">${verdict}</span>
      <span class="how">${session.item.how || ""}</span>
    </div>
    <div class="btnrow"><button class="btn" id="nextBtn">Next problem →</button></div>`;
  const nb = $("#nextBtn");
  nb.addEventListener("click", nextProblem);
  nb.focus();
}

/* ---------- navigation ---------- */
$("#backBtn").addEventListener("click", () => {
  if (nav.screen === "map") { nav = { screen: "drill" }; nextProblem(); return; }
  if (nav.screen === "drill" && session && session.backTo === "lesson") showLesson(session.lesson);
  else showHome();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && nav.screen === "drill" && session && session.graded) {
    const nb = $("#nextBtn"); if (nb && document.activeElement !== nb) { e.preventDefault(); nextProblem(); }
  }
});

showHome();

</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
</script>
